<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convocação Copa do Mundo 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-wrapper">
    <h1>Convocação Copa do Mundo 2026</h1>

    <div class="container">
      <div class="form-area">
        <h2>Cadastrar Jogador</h2>
        <form id="formJogador">
          <input type="hidden" id="jogadorId"> 
          
          <label>Nome</label>
          <input type="text" id="nome" required>

          <label>Número da camisa</label>
          <input type="number" id="numeroCamisa" required>

          <label>Data nascimento</label>
          <input type="date" id="dataNascimento" required>

          <label>Posição</label>
          <select id="posicao">
            <option value="Goleiro">Goleiro</option>
            <option value="Zagueiro">Zagueiro</option>
            <option value="Meia">Meia</option>
            <option value="Atacante">Atacante</option>
          </select>

          <label>Seleção</label>
          <select id="selecao"></select>

          <label>Titular</label>
          <div class="radio-group">
            <input type="radio" name="titular" value="true"> Sim
            <input type="radio" name="titular" value="false"> Não
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="termos"> Ative a resenha
          </label>

          <button type="submit">Salvar Jogador</button>
        </form>
      </div>

      <div class="table-area">
        <h2>Jogadores cadastrados</h2>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Camisa</th>
              <th>Posição</th>
              <th>Seleção</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="listaJogadores"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
